name: My First Workflow
on:
  push:
  pull_request:
  schedule:
    - cron: "20 15 * * *"
jobs:
  say-hello:  #job name
    runs-on: ubuntu-latest  #os on which job will run

    steps:
      - name: Print message
        run: echo "Hello, Github Actions!"
      - name: Print name
        run: echo "Sanam"
  say-bye:
    runs-on: ubuntu-latest
    steps:
      - name: print message
        run: echo "Good bye from second job" 